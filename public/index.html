<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-EXCHANGE DOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen">

    <nav class="navbar sticky top-0 z-50 h-20 flex items-center px-6 justify-between">
        <div class="flex items-center gap-3">
            <div class="p-2 border border-cyan-400 shadow-[0_0_10px_#00f2ff]"><i class="fas fa-bolt"></i></div>
            <h1 class="orbitron text-xl font-bold">CYBER<span class="text-cyan-400">DOP</span></h1>
        </div>
        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleModal()">
            <div class="text-right hidden sm:block">
                <p class="text-[10px] text-purple-500 font-bold uppercase">System Operator</p>
                <p class="text-white font-bold orbitron text-xs">ROOT_USER_X</p>
            </div>
            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Felix" class="profile-img">
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <!-- CALCULADORA -->
        <section class="cyber-card p-8 rounded-2xl mb-12 border-l-4 border-l-cyan-400">
            <div class="scanline"></div>
            <h2 class="orbitron text-white mb-6 text-sm"><i class="fas fa-microchip mr-2 text-cyan-400"></i>NUCLEO_DE_CONVERSION</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 block mb-2 uppercase tracking-widest">Monto Divisa</label>
                    <input type="number" id="calcInput" value="1" class="cyber-input w-full p-4 text-2xl font-bold rounded-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 block mb-2 uppercase tracking-widest">Moneda Origen</label>
                    <select id="fromCurrency" class="cyber-select w-full p-4 text-xl font-bold rounded-lg"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-purple-400 block mb-2 uppercase tracking-widest">Valor en DOP</label>
                    <div id="calcResult" class="result-box w-full p-4 text-2xl font-bold text-white rounded-lg">RD$ 0.00</div>
                </div>
            </div>
        </section>

        <!-- GRID DE MERCADO -->
        <div id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12"></div>

        <!-- GRAFICO -->
        <section class="cyber-card p-8 rounded-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="orbitron text-white text-sm uppercase">Analisis_de_Fluctuacion</h2>
                <div id="chartBadge" class="badge-tech">USD / DOP</div>
            </div>
            <div id="mainChart"></div>
        </section>
    </main>

    <!-- MODAL (Cerrado por defecto) -->
    <div id="bioModal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4">
        <div class="cyber-card max-w-md w-full p-8 rounded-2xl border-cyan-500 border-2">
            <button onclick="toggleModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div class="text-center">
                <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Felix" class="w-24 h-24 mx-auto mb-4 border-2 border-purple-500">
                <h3 class="orbitron text-xl mb-2">ARCHITECT_DEV</h3>
                <p class="text-sm text-gray-400 mb-6">Terminal financiera v1.0. Desarrollada para visualización de activos en tiempo real.</p>
                <div class="flex justify-center gap-4">
                    <span class="badge-tech">NODE.JS</span>
                    <span class="badge-tech">EXPRESS</span>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
